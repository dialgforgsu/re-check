function renderFeed(){
  const feed=document.getElementById('feed');
  const q   =document.getElementById('search').value.toLowerCase();
  const prods=activeTab==='all'?getOrdered():PRODUCTS_DEF.filter(p=>p.id===activeTab);
  const anyFetching=prods.some(p=>statuses[p.id]==='fetching');

  // Flatten all data
  let allData=[];
  prods.forEach(p=>{
    (releases[p.id]||[]).forEach(r=>{
      r.changes.forEach(c=>{ c.productId=p.id; allData.push({prod:p,release:r,change:c}); });
    });
  });

  // Enterprise chip filters by subLabel; all other chips filter by type
  if(typeFilter==='enterprise') allData=allData.filter(d=>d.change.subLabel==='Enterprise');
  else if(typeFilter!=='all')   allData=allData.filter(d=>d.change.type===typeFilter);
  if(q) allData=allData.filter(d=>
    d.prod.name.toLowerCase().includes(q)||
    d.release.version.toLowerCase().includes(q)||
    d.change.text.toLowerCase().includes(q)
  );

  // Keep the release notes in a global place for optional mapping later
  window.allRoadmapReleaseNotes = allData;
  document.getElementById('filter-count').textContent=allData.length?`${allData.length} entr${allData.length!==1?'ies':'y'}`:'';

  // ── EMPTY / ERROR ──
  if(!allData.length&&!anyFetching){
    const p=activeTab!=='all'?PRODUCTS_DEF.find(p=>p.id===activeTab):null;
    const hasErr=activeTab!=='all'&&errors[activeTab];
    if(hasErr){
      feed.innerHTML=`<div class="err-banner">⚠ ${esc(errors[activeTab])} — <a href="${p?.urls[0]?.url||p?.urls[0]||'#'}" target="_blank" style="color:inherit;text-decoration:underline">open docs →</a></div>
        <div class="empty"><div class="ei">⚠️</div><div class="et">Could not load ${p?.name||''}</div>
        <div class="ed">Click Retry, or open the docs directly to verify the page is accessible.</div>
        <button class="btn btn-ghost" onclick="fetchOneTab('${activeTab}',event)" style="margin-top:6px">↻ Retry</button></div>`;
      return;
    }
    const isProduct=activeTab!=='all';
    feed.innerHTML=`<div class="empty"><div class="ei">${q||typeFilter!=='all'?'🔍':'📋'}</div>
      <div class="et">${q||typeFilter!=='all'?'No matches':'No release notes loaded'}</div>
      <div class="ed">${q||typeFilter!=='all'?'Try adjusting your search or filter.':'Click ↓ Fetch in the tab, or Fetch All.'}</div>
      ${!q&&typeFilter==='all'?`<button class="btn btn-primary" onclick="${isProduct?`fetchOneTab('${activeTab}',event)`:'fetchAll()'}">↓ ${isProduct?'Fetch '+(PRODUCTS_DEF.find(p=>p.id===activeTab)?.name||''):'Fetch All'}</button>`:''}
    </div>`;
    return;
  }

  let html='';

  // ── LOADING SHIMMER ──
  if(anyFetching){
    prods.filter(p=>statuses[p.id]==='fetching').forEach(p=>{
      html+=`<div style="margin-bottom:20px">
        ${activeTab==='all'?`<div class="rg-product-hdr"><div class="rg-picon" style="background:${p.bg};color:${p.color}">${p.abbr}</div><div class="rg-pname">${p.name}</div><span style="font-size:10px;color:var(--amber);font-family:'DM Mono',monospace">fetching…</span></div>`:''}
        <div class="loading-bar"></div><div class="loading-bar" style="opacity:.6"></div><div class="loading-bar" style="opacity:.3"></div>
      </div>`;
    });
  }

  // ── UP TO DATE BANNER ──
  if(!anyFetching && !q && typeFilter==='all'){
    const loadedProds = prods.filter(p=>releases[p.id]?.length>0);
    if(loadedProds.length>0 && loadedProds.every(p=>upToDate[p.id])){
      html+=`<div class="utd-banner">✓ All release notes are up to date</div>`;
    }
  }

  // ── Q1 ──
  let q1HTML = '';
  if(!q && typeFilter==='all' && allData.length>0){
    if(activeTab==='all'){
      q1HTML = buildQ1HTML(allData,null);
    } else {
      const p = PRODUCTS_DEF.find(p=>p.id===activeTab);
      q1HTML = buildQ1HTML(allData,p?.name||'');
    }
  }

  // ── RENDER ──
  if(activeTab==='all'){
    const loadedProds = getOrderedByLatest().filter(p=>(releases[p.id]||[]).length>0);
    if(!loadedProds.length){
      html += '<div class="empty"><div class="ei">📋</div><div class="et">No release notes loaded</div><div class="ed">Click Fetch All or refresh one product.</div></div>';
    } else {
      const notesByProd = {};
      allData.forEach(d=>{
        if(!notesByProd[d.prod.id]) notesByProd[d.prod.id] = [];
        notesByProd[d.prod.id].push(d);
      });

      let notesHTML = '<div class="notes-panel">';
      getOrderedByLatest().forEach(p=>{
        const productItems = notesByProd[p.id];
        if(!productItems || !productItems.length) return;

        // Show only latest release per product
        const byVer = {};
        productItems.forEach(d=>{
          const key = d.release.version || d.release.date || 'Recent';
          if(!byVer[key]) byVer[key] = {release:d.release, items:[]};
          byVer[key].items.push(d.change);
        });

        const latestGroup = Object.values(byVer)
          .sort((a,b)=>parseDateToTimestamp(b.release.date||'')-parseDateToTimestamp(a.release.date||''))[0];

        if(!latestGroup) return;

        notesHTML += `<div class="notes-product"><div class="notes-product-hdr">${esc(p.name)}</div>`;
        notesHTML += `<div class="notes-release"><div class="notes-release-hdr">${latestGroup.release.version?`v${esc(latestGroup.release.version)}`:'Recent'}${latestGroup.release.date?` • ${esc(latestGroup.release.date)}`:''}</div><div class="notes-change-list">${latestGroup.items.slice(0,5).map(changeRow).join('')}</div></div>`;
        notesHTML += '</div>';
      });

      notesHTML += '</div>';

      html += `<div class="all-products-columns">
  <div class="all-left-sticky" id="associated-panel"></div>
  <div class="all-middle">
    <div class="wrap">
      ${q1HTML}
      <div class="summary" id="summary"></div>
      <div class="controls">
          <select id="filterProd" onchange="renderRoadmap()">
          <option value="">All products</option>
          <option>Monitor</option><option>Flyway</option><option>TDM</option><option>Productivity</option>
        </select>
        <select id="filterPhase" onchange="renderRoadmap()">
          <option value="">All phases</option>
          <option>Developing</option><option>Researching</option>
        </select>
        <button id="map-roadmap-btn" class="btn btn-primary" onclick="mapRoadmapWithAI()">Map roadmap to release notes</button>
      </div>
      <table>
        <thead>
          <tr>
            <th onclick="setRoadmapSort('product')" style="cursor:pointer;user-select:none" id="rth-product">Product</th>
            <th onclick="setRoadmapSort('phase')" style="cursor:pointer;user-select:none" id="rth-phase">Phase</th>
            <th onclick="setRoadmapSort('item')" style="cursor:pointer;user-select:none;min-width:240px" id="rth-item">Roadmap item</th>
            <th onclick="setRoadmapSort('assoc')" style="cursor:pointer;user-select:none;min-width:180px" id="rth-assoc">Associated changes</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="all-right">${notesHTML}</div>
</div>`;
    }

  } else {
    // Single product view
    const p=PRODUCTS_DEF.find(p=>p.id===activeTab);
    const ver=latestVer[p?.id]||'';
    const dt =latestDate[p?.id]||'';

    // Product header — TDM gets per-sub-section refresh buttons; others get a single refresh
    const isTdmPage = activeTab === 'tdm';
    const tdmSubs = isTdmPage ? [
      { label:'Subsetter',  url:'https://documentation.red-gate.com/testdatamanager/command-line-interface-cli/subsetting/subsetter-release-notes' },
      { label:'Anonymize',  url:'https://documentation.red-gate.com/testdatamanager/command-line-interface-cli/anonymization/anonymize-release-notes' },
      { label:'TDM GUI',    url:'https://documentation.red-gate.com/testdatamanager/graphical-user-interface-gui/gui-release-notes' },
      { label:'Workflows',  url:'https://documentation.red-gate.com/testdatamanager/command-line-interface-cli/using-workflows-rgworkflow/workflows-release-notes' },
    ] : [];
    const tdmSubButtons = tdmSubs.map(s=>
      `<div style="display:flex;gap:2px">
        <button class="btn btn-ghost" style="font-size:10px;padding:4px 9px" onclick="fetchTdmSub('${s.url}','${s.label}',event)">↻ ${s.label}</button>
        <a href="${s.url}" target="_blank" class="btn btn-ghost" style="font-size:10px;padding:4px 6px" title="Open ${s.label} docs">↗</a>
      </div>`
    ).join('');
    html+=`<div class="prod-page-hdr" style="flex-wrap:wrap;gap:8px">
      <div class="prod-page-icon" style="background:${p?.bg};color:${p?.color}">${p?.abbr}</div>
      <div class="prod-page-name">${p?.name||''}</div>
      ${!isTdmPage&&ver?`<div class="prod-page-ver">v${esc(ver)}</div>`:''}
      ${!isTdmPage&&dt?`<div class="prod-page-date">${esc(dt)}</div>`:''}
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        ${isTdmPage ? tdmSubButtons : `<button class="btn btn-ghost" onclick="fetchOneTab('${activeTab}',event)" style="font-size:11px;padding:5px 11px">↻ Refresh</button>`}
        ${!isTdmPage ? `<a href="${p?.urls[0]?.url||p?.urls[0]||'#'}" target="_blank" class="btn btn-ghost" style="font-size:11px;padding:5px 11px">↗ Docs</a>` : ''}
      </div>
    </div>`;

    if(errors[activeTab]){
      html+=`<div class="err-banner">⚠ ${esc(errors[activeTab])} — <a href="${p?.urls[0]?.url||'#'}" target="_blank" style="color:inherit;text-decoration:underline">open docs →</a></div>`;
    }

    // Add Current Quarter At A Glance for single product
    html += q1HTML;

    // Group changes by version
    const byVer={}, verOrder=[];
    allData.forEach(d=>{
      if(!byVer[d.release.version]){byVer[d.release.version]={rel:d.release,items:[]};verOrder.push(d.release.version);}
      byVer[d.release.version].items.push(d.change);
    });

    verOrder.forEach((ver,vi)=>{
      const {rel,items}=byVer[ver];
      // TDM: "version" field IS the date string — show as date heading, not version pill
      // Other products: show version pill + date label
      const isTdm = activeTab==='tdm';
      html+=`<div class="ver-block" style="animation:fadeUp .2s ease ${vi*40}ms both">
        <div class="ver-hdr">
          ${isTdm
            ? `<span class="ver-date" style="font-size:13px;font-weight:600;color:var(--t1);font-family:'Syne',sans-serif">${esc(rel.date||rel.version)}</span>`
            : `<span class="ver-pill">v${esc(rel.version)}</span>${rel.date?`<span class="ver-date">${esc(rel.date)}</span>`:''}`
          }
          <a href="${rel.docsUrl||p?.urls[0]?.url||'#'}" target="_blank" class="ver-docslink">↗ full notes</a>
        </div>
        <div class="change-list">${items.map(c=>changeRow(c)).join('')}</div>
      </div>`;
    });
  }

  feed.innerHTML=html||`<div class="empty"><div class="ei">🔍</div><div class="et">No matches</div><div class="ed">Try adjusting your search or filter.</div></div>`;
}

function changeRow(c){
  const typeTag = `<span class="ctag ${CTAG[c.type]||'ctag-improvement'}">${CLABEL[c.type]||c.type}</span>`;
  // Only show a sub-area badge for TDM component labels — not for Enterprise or Security
  const TDM_SUB_LABELS = new Set(['Subsetter','Anonymize','GUI','Workflows']);
  const showSub = c.subLabel && TDM_SUB_LABELS.has(c.subLabel);
  const subBadgeLabel = c.subLabel === 'GUI' ? 'TDM GUI' : (c.subLabel||'');
  const subBadge = showSub
    ? `<span class="sub-badge sub-badge-${c.subLabel}">${esc(subBadgeLabel)}</span>`
    : '';
  const enterpriseBadge = (c.productId === 'monitor' && /\benterprise\b/i.test(c.text))
    ? `<span class="sub-badge sub-badge-Enterprise">Enterprise</span>`
    : '';
  return `<div class="change-item">
    <div class="ctag-col">${typeTag}${subBadge}${enterpriseBadge}</div>
    <span class="change-text">${esc(c.text)}</span>
  </div>`;
}

  typeFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderFeed();
}

function clearAll(){
  releases={}; errors={}; statuses={}; latestVer={}; latestDate={}; upToDate={};
  activeTab='all';
  document.getElementById('sync-lbl').textContent='Not synced';
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('search').value='';
  renderTabBar(); renderFeed();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ROADMAP TRACKER
const ITEMS = [
  {id:1, product:"Monitor", phase:"Developing", item:"Deeper SQL Server workload analysis"},
  {id:2, product:"Monitor", phase:"Developing", item:"Redgate Monitor SaaS"},
  {id:3, product:"Monitor", phase:"Developing", item:"Enhanced PostgreSQL monitoring"},
  {id:4, product:"Monitor", phase:"Developing", item:"Enhanced security and compliance monitoring"},
  {id:5, product:"Monitor", phase:"Developing", item:"Google Cloud SQL support"},
  {id:6, product:"Monitor", phase:"Researching", item:"Cloud cost analysis"},
  {id:7, product:"Monitor", phase:"Researching", item:"AI-powered troubleshooting & recommendations"},
  {id:8, product:"Flyway", phase:"Developing", item:"Policy checks and code review management in Flyway Desktop"},
  {id:9, product:"Flyway", phase:"Developing", item:"AI-powered help to create your own policies"},
  {id:10, product:"Flyway", phase:"Developing", item:"Integrations for popular CI/CD systems, incl. GitHub and ADO"},
  {id:11, product:"Flyway", phase:"Developing", item:"Richer Oracle capabilities"},
  {id:12, product:"Flyway", phase:"Researching", item:"Performance impact analysis"},
  {id:13, product:"TDM", phase:"Developing", item:"AI classification – get set up faster, protect more data"},
  {id:14, product:"TDM", phase:"Developing", item:"Simplified masking configuration & customization"},
  {id:15, product:"TDM", phase:"Developing", item:"PG Aurora support"},
  {id:16, product:"TDM", phase:"Developing", item:"User interface improvements – zero command line required"},
  {id:17, product:"TDM", phase:"Researching", item:"Automated audit-ready reports"},
  {id:18, product:"TDM", phase:"Researching", item:"RBAC functionality – control who can access sensitive data"},
  {id:19, product:"Productivity", phase:"Developing", item:"AI Code Completion (Prompt)"},
  {id:20, product:"Productivity", phase:"Developing", item:"Redgate Assistant (Prompt)"},
  {id:21, product:"Productivity", phase:"Developing", item:"Redgate Data Modeler in TBE"},
  {id:22, product:"Productivity", phase:"Developing", item:"Dark Mode (Prompt)"},
  {id:23, product:"Productivity", phase:"Researching", item:"Agentic AI"},
  {id:24, product:"Productivity", phase:"Researching", item:"Further integration of TBE tools"},
  {id:25, product:"Productivity", phase:"Researching", item:"Support for VS Code"},
];

const roadmapState = {};
const roadmapAssociations = {};
ITEMS.forEach(i => { roadmapState[i.id] = { pct: 0 }; roadmapAssociations[i.id] = []; });

let roadmapSort = { col: 'assoc', dir: -1 }; // default: most associations first

function setRoadmapSort(col){
  if(roadmapSort.col === col){ roadmapSort.dir *= -1; }
  else { roadmapSort = { col, dir: 1 }; }
  renderRoadmap();
}

const prodColor = { Monitor:"monitor", Flyway:"flyway", TDM:"tdm", Productivity:"prod" };
const phaseColor = { Developing:"dev", Researching:"res" };
const pctColor = p => p === 100 ? "#639922" : p >= 50 ? "#185FA5" : p > 0 ? "#BA7517" : "#B4B2A9";
const typeWeight = { breaking: 5, security: 4, feature: 3, fix: 2, improvement: 1 };

function renderRoadmap() {
  const q = document.getElementById("search").value.toLowerCase();
  const fp = document.getElementById("filterProd").value;
  const fph = document.getElementById("filterPhase").value;
  const rows = ITEMS.filter(i =>
    (!q || i.item.toLowerCase().includes(q) || i.product.toLowerCase().includes(q)) &&
    (!fp || i.product === fp) &&
    (!fph || i.phase === fph)
  );
  const { col, dir } = roadmapSort;
  rows.sort((a, b) => {
    let av, bv;
    if(col === 'product'){ av = a.product; bv = b.product; return dir * av.localeCompare(bv); }
    if(col === 'phase')  { av = a.phase;   bv = b.phase;   return dir * av.localeCompare(bv); }
    if(col === 'item')   { av = a.item;    bv = b.item;    return dir * av.localeCompare(bv); }
    // default: assoc count
    return dir * ((roadmapAssociations[a.id]?.length||0) - (roadmapAssociations[b.id]?.length||0));
  });

  // Update header sort indicators
  ['product','phase','item','assoc'].forEach(c => {
    const th = document.getElementById('rth-'+c);
    if(!th) return;
    const baseLabel = { product:'Product', phase:'Phase', item:'Roadmap item', assoc:'Associated changes' }[c];
    th.textContent = baseLabel + (col === c ? (dir === 1 ? ' ▲' : ' ▼') : '');
  });

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = rows.map(i => {
    const s = roadmapState[i.id];
    return `<tr>
      <td><span class="pill pill-${prodColor[i.product]}">${i.product}</span></td>
      <td><span class="pill pill-${phaseColor[i.phase]}">${i.phase}</span></td>
      <td>${i.item}</td>
        <td>
        ${roadmapAssociations[i.id] && roadmapAssociations[i.id].length > 0
          ? `<button class="btn btn-ghost" onclick="showAssociatedNotes(${i.id})">Release Associated (${roadmapAssociations[i.id].length})</button>`
          : `<span style="color:var(--t3)">None</span>`
        }
      </td>
    </tr>`;
  }).join("");
  updateSummary();
}

function updateSummary() {
  const matched = ITEMS.filter(i => roadmapAssociations[i.id]?.length > 0).length;
  document.getElementById("summary").innerHTML = `
    <div class="sum-card"><div class="sum-label">Roadmap items</div><div class="sum-val" style="color:#185FA5">${matched} / ${ITEMS.length}</div></div>
  `;
}

function mapReleasesToRoadmap(allData) {
  // Reset progress and associations
  ITEMS.forEach(i => { roadmapState[i.id].pct = 0; roadmapAssociations[i.id] = []; });

  // Stop words to exclude from keyword matching
  const stopWords = new Set(['the', 'and', 'for', 'are', 'but', 'not', 'you', 'all', 'can', 'her', 'was', 'one', 'our', 'had', 'by', 'word', 'how', 'said', 'each', 'which', 'their', 'time', 'will', 'about', 'many', 'then', 'them', 'these', 'so', 'some', 'her', 'would', 'make', 'like', 'him', 'into', 'has', 'look', 'more', 'write', 'go', 'see', 'no', 'way', 'could', 'people', 'my', 'than', 'first', 'water', 'been', 'call', 'who', 'oil', 'its', 'now', 'find', 'long', 'down', 'day', 'did', 'get', 'come', 'made', 'may', 'part']);

  // For each change, check if it matches any roadmap item
  allData.forEach(d => {
    const changeText = d.change.text.toLowerCase().replace(/[^\w\s]/g, ''); // Remove punctuation
    ITEMS.forEach(item => {
      const itemText = item.item.toLowerCase().replace(/[^\w\s]/g, '');
      let shouldAssociate = false;

      // Check if full item text is contained in change text
      if (changeText.includes(itemText)) {
        shouldAssociate = true;
      } else {
        // Extract keywords from item text (words > 3 chars, not stop words)
        const itemWords = itemText.split(/\s+/).filter(word => word.length > 3 && !stopWords.has(word));
        // Count matching keywords in change text
        const matchCount = itemWords.filter(word => changeText.includes(word)).length;
        // Require at least 2 matching keywords for association
        if (matchCount >= 2) {
          shouldAssociate = true;
        }
      }

      if (shouldAssociate) {
        if (!roadmapAssociations[item.id].some(x => x.text === d.change.text && x.release === d.release.version)) {
          roadmapAssociations[item.id].push({
            prod: d.prod.name,
            release: d.release.version || d.release.date || 'Recent',
            text: d.change.text,
            type: d.change.type || 'improvement',
            weight: typeWeight[d.change.type] || 0
          });
        }
        roadmapState[item.id].pct = Math.min(100, roadmapState[item.id].pct + 20);
      }
    });
  });
}

async function mapRoadmapWithAI() {
  const btn = document.getElementById('map-roadmap-btn');
  const allData = window.allRoadmapReleaseNotes || [];
  if(!allData.length){
    alert('Fetch release notes first.');
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Mapping…';

  // Placeholder for AI mapping; currently runs heuristic mapper as fallback.
  await new Promise(resolve => setTimeout(resolve, 300));
  mapReleasesToRoadmap(allData);

  // Simulate AI ranking: sort roadmap items by matching progress, descending.
  ITEMS.sort((a,b)=>roadmapState[b.id].pct - roadmapState[a.id].pct || a.id-b.id);

  renderRoadmap();
  btn.disabled = false;
  btn.textContent = 'Map roadmap to release notes';
}

function showAssociatedNotes(itemId){
  let items = roadmapAssociations[itemId] || [];
  const panel = document.getElementById('associated-panel');
  if(!items.length){
    panel.innerHTML = `<div class="sum-card" style="background:var(--bg2);border:1px solid var(--border);">No associated release notes found.</div>`;
    return;
  }
  items.sort((a, b) => (b.weight || 0) - (a.weight || 0));
  const actionText = items.length === 1 ? 'Release note' : 'Release notes';
  const list = items.map((i,idx)=>`<li><strong>${i.prod} ‒ ${i.release}</strong>: ${esc(i.text)}</li>`).join('');
  panel.innerHTML = `<div class="sum-card" style="background:var(--bg2);border:1px solid var(--border);padding:12px;">
      <div class="sum-label">${actionText} associated (${items.length})</div>
      <ul style="margin-top:8px;padding-left:18px;line-height:1.4;font-size:12px;">${list}</ul>
    </div>`;
}

renderRoadmap();
</script>
