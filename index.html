<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Redgate Release Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rg:#C8102E;--rg-dim:rgba(200,16,46,0.09);--rg-glow:rgba(200,16,46,0.22);
  --green:#22c55e;--blue:#60a5fa;--amber:#f59e0b;--purple:#a78bfa;
  --color-background-primary: var(--bg);
  --color-background-secondary: var(--bg1);
  --color-text-primary: var(--t1);
  --color-text-secondary: var(--t2);
  --color-border-secondary: var(--border);
  --color-border-tertiary: var(--border2);
  --border-radius-md: 6px;
  --font-sans: 'Inter', sans-serif;
}
[data-theme="dark"]{
  --bg:#0b0b0e;--bg1:#111115;--bg2:#17171c;--bg3:#1e1e25;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --t1:#f0eee9;--t2:#9896a0;--t3:#4a4a56;
  --topbar:#0e0e12;--tabbar:#0e0e12;
}
[data-theme="light"]{
  --bg:#f0f0f4;--bg1:#ffffff;--bg2:#f4f4f8;--bg3:#e8e8ef;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.14);
  --t1:#111118;--t2:#5a5a6a;--t3:#b0b0c0;
  --topbar:#ffffff;--tabbar:#f8f8fc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.6;transition:background .2s,color .2s;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOP BAR */
.topbar{height:52px;flex-shrink:0;z-index:200;background:var(--topbar);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 20px}
.logo{width:27px;height:27px;background:var(--rg);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:#fff;flex-shrink:0}
.logo-text{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.2px;white-space:nowrap}
.logo-text em{color:var(--rg);font-style:normal}
.tb-div{width:1px;height:18px;background:var(--border);flex-shrink:0}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);white-space:nowrap}
.btn{display:inline-flex;align-items:center;gap:5px;border-radius:6px;cursor:pointer;transition:all .12s;border:none;font-size:12px;font-weight:500;padding:6px 13px;font-family:'Inter',sans-serif;white-space:nowrap}
.btn-primary{background:var(--rg);color:#fff}
.btn-primary:hover:not(:disabled){background:#e01535;box-shadow:0 3px 12px var(--rg-glow)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--t1);background:var(--bg2)}
.btn-icon{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--t2);cursor:pointer;padding:5px 8px;font-size:14px;transition:all .12s;line-height:1}
.btn-icon:hover{border-color:var(--border2);color:var(--t1)}

/* TAB BAR */
.tabbar{flex-shrink:0;background:var(--tabbar);border-bottom:1px solid var(--border);display:flex;align-items:stretch;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;position:relative;z-index:100;user-select:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{display:flex;flex-direction:column;justify-content:center;padding:0 15px;min-width:fit-content;cursor:pointer;border-right:1px solid var(--border);border-bottom:2px solid transparent;transition:background .12s,border-color .12s;flex-shrink:0;gap:1px;height:54px;position:relative;white-space:nowrap}
.tab:hover{background:var(--bg2)}
.tab.active{border-bottom-color:var(--rg);background:var(--bg1)}
.tab.drag-over{outline:2px dashed var(--rg);outline-offset:-2px}
.tab.dragging{opacity:.3}
.tab-name{font-family:'Inter',sans-serif;font-weight:600;font-size:12px;color:var(--t2);transition:color .12s;display:flex;align-items:center;gap:6px}
.tab.active .tab-name,.tab:hover .tab-name{color:var(--t1)}
.tab-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--t1);display:flex;align-items:center;gap:6px;font-weight:600}
.tab-date{color:var(--t1);font-weight:700;letter-spacing:.02em;}
[data-theme="light"] .tab-date{color:#000!important;}
[data-theme="dark"] .tab-date{color:#fff!important;}
.tab-ver{color:var(--rg);font-weight:500}
.tab-utd{font-size:9px;font-weight:600;color:#16a34a;letter-spacing:.02em}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .12s}
.tab.fetching .tab-dot{background:var(--amber)!important;animation:pulse .7s ease-in-out infinite}
.tab.done .tab-dot{background:var(--green)!important}
.tab.err .tab-dot{background:#ef4444!important}
.tab-all .tab-name{font-family:'Syne',sans-serif;font-weight:700}
.tab-all.active .tab-name{color:var(--rg)}
.tab-fetch-btn{position:absolute;top:4px;right:4px;background:none;border:none;cursor:pointer;font-size:10px;color:var(--t3);opacity:0;padding:2px 4px;border-radius:3px;line-height:1}
.tab:hover .tab-fetch-btn{opacity:.8}
.tab:hover .tab-fetch-btn:hover{opacity:1;color:var(--rg);background:var(--rg-dim)}
.tab-all .tab-fetch-btn{display:none}

/* PROGRESS */
.prog-line{height:2px;background:var(--bg3);flex-shrink:0;display:none;overflow:hidden}
.prog-line.show{display:block}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rg),#ff4f6d);transition:width .3s ease;box-shadow:0 0 6px var(--rg-glow)}

/* FILTER BAR */
.filterbar{flex-shrink:0;padding:9px 20px;border-bottom:1px solid var(--border);background:var(--bg1);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:140px;max-width:300px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none}
.search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 11px 7px 30px;color:var(--t1);font-family:'Inter',sans-serif;font-size:12px;outline:none;transition:border-color .12s}
.search:focus{border-color:rgba(200,16,46,.35)}
.search::placeholder{color:var(--t3)}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:4px 11px;border-radius:100px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--t2);transition:all .12s;font-family:'Inter',sans-serif}
.chip:hover{border-color:var(--border2);color:var(--t1)}
.chip.on{background:var(--rg-dim);border-color:rgba(200,16,46,.3);color:var(--rg)}
.filter-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);margin-left:auto;white-space:nowrap}

/* FEED */
.feed-wrap{flex:1;overflow-y:auto;overflow-x:hidden}
.feed-wrap::-webkit-scrollbar{width:4px}
.feed-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.feed{max-width:1600px;margin:0 auto;padding:20px 24px}

.all-products-columns{display:grid;grid-template-columns:320px 1fr 360px;gap:16px;align-items:start}
@media (max-width:1500px){.all-products-columns{grid-template-columns:280px 1fr 320px;}}
@media (max-width:1180px){.all-products-columns{grid-template-columns:1fr;}}
.all-left-sticky{position:sticky;top:60px;height:fit-content;overflow-y:auto;max-height:calc(100vh - 120px);scrollbar-width:thin}
.all-left-sticky::-webkit-scrollbar{width:4px}
.all-left-sticky::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.all-left,.all-right{display:flex;flex-direction:column;gap:14px}
.all-middle{display:flex;flex-direction:column;gap:14px}
.notes-panel{display:flex;flex-direction:column;gap:12px}
.notes-product{background:var(--bg1);border:1px solid var(--border);border-radius:10px;padding:12px}
.notes-product-hdr{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--t1);margin-bottom:8px}
.notes-release{margin-bottom:10px}
.notes-release-hdr{font-family:'DM Mono',monospace;font-size:11px;color:var(--t3);margin-bottom:6px}
.notes-change-list{display:flex;flex-direction:column;gap:6px}

/* PRODUCT PAGE HEADER (single-product view) */
.prod-page-hdr{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
  padding:14px 16px;background:var(--bg1);border:1px solid var(--border);
  border-radius:10px;flex-wrap:wrap;
}
.prod-page-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;flex-shrink:0}
.prod-page-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--t1);flex:1}
.prod-page-ver{font-family:'DM Mono',monospace;font-size:11px;color:var(--rg);background:var(--rg-dim);border:1px solid rgba(200,16,46,.18);padding:3px 9px;border-radius:4px}
.prod-page-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--t1);font-weight:600}

/* PRODUCT GROUP HEADER (all-products view) */
.rg-product-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rg-picon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8px;font-weight:500;flex-shrink:0}
.rg-pname{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--t1)}
.rg-pver{font-family:'DM Mono',monospace;font-size:10px;color:var(--rg);background:var(--rg-dim);border:1px solid rgba(200,16,46,.16);padding:2px 7px;border-radius:3px}
.rg-pdate{font-family:'DM Mono',monospace;font-size:10px;color:var(--t1);font-weight:600}
.rg-docslink{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);text-decoration:none;opacity:.6;transition:opacity .12s}
.rg-docslink:hover{opacity:1;color:var(--rg)}

/* VERSION BLOCK */
.ver-block{margin-bottom:22px}
.ver-hdr{
  display:flex;align-items:center;gap:10px;
  margin-bottom:10px;padding-bottom:9px;
  border-bottom:2px solid var(--border);flex-wrap:wrap;
}
.ver-pill{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--rg);background:var(--rg-dim);border:1px solid rgba(200,16,46,.2);padding:4px 12px;border-radius:5px;flex-shrink:0}
.ver-date{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--t1);}
.ver-docslink{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);text-decoration:none;opacity:.6;transition:opacity .12s}

[data-theme="light"] .ver-date,
[data-theme="light"] .prod-page-date,
[data-theme="light"] .rg-pdate { color: #000 !important; }

[data-theme="dark"] .ver-date,
[data-theme="dark"] .prod-page-date,
[data-theme="dark"] .rg-pdate { color: #fff !important; }
.ver-docslink:hover{opacity:1;color:var(--rg)}

/* CHANGE ITEMS */
.change-list{display:flex;flex-direction:column;gap:3px}
.change-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg1);transition:border-color .12s,background .12s}
.change-item:hover{border-color:var(--border2);background:var(--bg2)}
.ctag-col{display:flex;flex-direction:column;gap:4px;flex-shrink:0;align-items:stretch;min-width:82px}
.ctag{font-family:'Inter',sans-serif;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.6px;padding:3px 7px;border-radius:4px;text-align:center;width:100%;box-sizing:border-box}
.ctag-feature    {background:rgba(96,165,250,.13); color:var(--blue);  border:1px solid rgba(96,165,250,.2)}
.ctag-fix        {background:rgba(34,197,94,.11);  color:var(--green); border:1px solid rgba(34,197,94,.18)}
.ctag-improvement{background:rgba(245,158,11,.11); color:var(--amber); border:1px solid rgba(245,158,11,.18)}
.ctag-breaking   {background:rgba(200,16,46,.11);  color:var(--rg);    border:1px solid rgba(200,16,46,.2)}
.ctag-security   {background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.18)}
.ctag-enterprise {background:rgba(245,158,11,.13);color:#d97706;border:1px solid rgba(245,158,11,.25)}
.change-text{font-size:12px;color:var(--t2);line-height:1.6;flex:1}
.change-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:2px}

/* TDM sub-section badges */
.sub-badge{font-family:'DM Mono',monospace;font-size:9px;font-weight:600;border-radius:4px;padding:3px 7px;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;text-align:center;width:100%;box-sizing:border-box}
.sub-badge-Subsetter {background:rgba(6,182,212,.13); color:#06B6D4;border:1px solid rgba(6,182,212,.25)}
.sub-badge-Anonymize {background:rgba(167,139,250,.13);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.sub-badge-GUI       {background:rgba(132,204,22,.12); color:#84CC16;border:1px solid rgba(132,204,22,.22)}
.sub-badge-Workflows  {background:rgba(249,115,22,.13); color:#F97316;border:1px solid rgba(249,115,22,.23)}
.sub-badge-Enterprise {background:rgba(245,158,11,.13); color:#d97706;border:1px solid rgba(245,158,11,.25)}
.sub-badge-default    {background:var(--bg2);color:var(--t3);border:1px solid var(--border)}

/* QUARTER AT A GLANCE */
.cq-wrap{background:linear-gradient(135deg,rgba(200,16,46,.07),rgba(200,16,46,.02));border:1px solid rgba(200,16,46,.18);border-radius:12px;padding:18px 22px;margin-bottom:24px}
.cq-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.cq-badge{background:var(--rg);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:9px;padding:3px 9px;border-radius:4px;letter-spacing:.8px;text-transform:uppercase;flex-shrink:0}
.cq-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--t1)}
.cq-period{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);margin-left:auto}
.cq-summary{font-size:13px;color:var(--t1);line-height:1.75;margin-bottom:16px;font-weight:400}
.cq-next{background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.cq-next-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--rg);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;font-weight:500}
.cq-bullets{display:flex;flex-direction:column;gap:6px}
.cq-bullet{display:flex;align-items:flex-start;gap:9px;font-size:12px;color:var(--t2);line-height:1.55}
.cq-dot{width:5px;height:5px;border-radius:50%;background:var(--rg);flex-shrink:0;margin-top:6px}

/* ROADMAP TRACKER */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
.controls select, .controls input { font-size: 13px; }
.controls input[type=text] { padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); width: 200px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-weight: 500; font-size: 12px; color: var(--color-text-secondary); padding: 6px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); white-space: nowrap; }
td { padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: middle; color: var(--color-text-primary); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-background-secondary); }
.pill { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
.pill-monitor   { background: #B5D4F4; color: #0C447C; }
.pill-flyway    { background: #C0DD97; color: #27500A; }
.pill-tdm       { background: #F5C4B3; color: #712B13; }
.pill-prod      { background: #CECBF6; color: #3C3489; }
.pill-dev   { background: #EEEDFE; color: #534AB7; }
.pill-res   { background: #F1EFE8; color: #5F5E5A; }
.progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 130px; }
.progress-bar { flex: 1; height: 6px; background: var(--color-background-secondary); border-radius: 99px; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.2s; }
.pct-label { font-size: 12px; color: var(--color-text-secondary); min-width: 30px; }
input[type=range].mini { width: 80px; height: 16px; margin: 0; }
.notes-input { font-size: 12px; padding: 4px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); width: 180px; }
.ref-input { font-size: 12px; padding: 4px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); width: 120px; }
.summary { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
.sum-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.sum-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
#assoc-preview ul { margin: 0; }
#assoc-preview li { margin-bottom: 4px; }
.sum-val { font-size: 20px; font-weight: 500; }
select { padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 13px; }

/* EMPTY / LOADING */
.empty{text-align:center;padding:60px 20px}
.ei{font-size:36px;margin-bottom:10px;opacity:.35}
.et{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--t2);margin-bottom:5px}
.ed{font-size:12px;color:var(--t3);max-width:280px;margin:0 auto 14px;line-height:1.6}
.loading-bar{height:44px;border-radius:7px;background:var(--bg1);border:1px solid var(--border);margin-bottom:4px;overflow:hidden;position:relative}
.loading-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shim 1.4s ease infinite}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.err-banner{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:7px;padding:10px 14px;font-size:11px;color:#f87171;font-family:'DM Mono',monospace;margin-bottom:12px}
.utd-banner{background:rgba(22,163,74,.07);border:1px solid rgba(22,163,74,.2);border-radius:7px;padding:10px 16px;font-size:12px;font-weight:600;color:#16a34a;margin-bottom:16px;letter-spacing:.01em}

.release-group{margin-bottom:28px;animation:fadeUp .2s ease both}

/* ALL-PRODUCTS HIGHLIGHT CARDS */
.hl-grid{display:flex;flex-direction:column;gap:14px}
.hl-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeUp .2s ease both;transition:border-color .15s}
.hl-card:hover{border-color:var(--border2)}
.hl-card-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.hl-picon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;flex-shrink:0}
.hl-pname{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--t1);flex:1}
.hl-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hl-ver{font-family:'DM Mono',monospace;font-size:10px;color:var(--rg);background:var(--rg-dim);border:1px solid rgba(200,16,46,.18);padding:2px 8px;border-radius:3px}
.hl-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.hl-goto{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);text-decoration:none;opacity:.6;transition:opacity .12s;border:1px solid var(--border);border-radius:4px;padding:2px 8px}
.hl-goto:hover{opacity:1;color:var(--rg);border-color:rgba(200,16,46,.3)}
.hl-body{padding:10px 14px 14px}
.hl-section-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin:8px 0 5px;padding-left:2px}

    const valid = saved.filter(id=>DEF_ORDER.includes(id));
    const added = DEF_ORDER.filter(id=>!valid.includes(id));
    return [...valid,...added];
  }catch{return [...DEF_ORDER];}
}

// SQLite / cache layer (sql.js in-browser) to persist fetch results between page loads
const DB_STORAGE_KEY = 'rg_release_db_v1';
const SNAPSHOT_TTL = 1000 * 60 * 30; // 30 mins
let sqlDb = null;
let initSqlJsFn = null;

function parseDateToTimestamp(date){
  if(!date) return 0;
  const parsed = Date.parse(date);
  if(!isNaN(parsed)) return parsed;
  const normalized = normaliseDate(date);
  const parsed2 = Date.parse(normalized);
  return isNaN(parsed2) ? 0 : parsed2;
}

function getOrderedByLatest(){
  return getOrdered().slice().sort((a,b)=>parseDateToTimestamp(latestDate[b.id]||'') - parseDateToTimestamp(latestDate[a.id]||''));
}

function canUseServerApi(){
  return (window.location.protocol === 'http:' || window.location.protocol === 'https:') && window.location.hostname && window.location.hostname !== '';
}

async function initDb(){
  if(sqlDb) return;
  if(!window.initSqlJs) {
    console.warn('sql.js is not loaded; persistence disabled');
    return;
  }
  if(!initSqlJsFn) initSqlJsFn = window.initSqlJs;
  const SQL = await initSqlJsFn({ locateFile: file => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/' + file });
  const stored = localStorage.getItem(DB_STORAGE_KEY);
  if(stored){
    try{ sqlDb = new SQL.Database(Uint8Array.from(JSON.parse(stored))); }
    catch(e){ console.warn('DB restore failed, creating new DB',e); sqlDb = new SQL.Database(); }
  } else {
    sqlDb = new SQL.Database();
  }
  sqlDb.run('CREATE TABLE IF NOT EXISTS url_cache(url TEXT PRIMARY KEY, productId TEXT, body TEXT, hash TEXT, updatedAt INTEGER)');
  sqlDb.run('CREATE TABLE IF NOT EXISTS product_snapshot(productId TEXT PRIMARY KEY, latestDate TEXT, latestVer TEXT, data TEXT, updatedAt INTEGER)');
  saveDb();
}

function saveDb(){
  if(!sqlDb) return;
  const data = sqlDb.export();
  localStorage.setItem(DB_STORAGE_KEY, JSON.stringify(Array.from(data)));
}

function getUrlCache(url){
  if(!sqlDb) return null;
  const stmt = sqlDb.prepare('SELECT productId,body,hash,updatedAt FROM url_cache WHERE url = ?');
  stmt.bind([url]);
  if(!stmt.step()){ stmt.free(); return null; }
  const row = stmt.getAsObject ? stmt.getAsObject() : null;
  stmt.free();
  if(!row) return null;
  return {productId: row.productId, body: row.body, hash: row.hash, updatedAt: row.updatedAt};
}

function setUrlCache(url, productId, body, hash){
  if(!sqlDb) return;
  const stmt = sqlDb.prepare('INSERT OR REPLACE INTO url_cache(url, productId, body, hash, updatedAt) VALUES(?,?,?,?,?)');
  stmt.bind([url, productId, body, hash, Date.now()]);
  stmt.step(); stmt.free();
  saveDb();
}

function getProductSnapshot(productId){
  if(!sqlDb) return null;
  const stmt = sqlDb.prepare('SELECT latestDate, latestVer, data, updatedAt FROM product_snapshot WHERE productId = ?');
  stmt.bind([productId]);
  if(!stmt.step()){ stmt.free(); return null; }
  const row = stmt.getAsObject ? stmt.getAsObject() : null;
  stmt.free();
  if(!row) return null;
  return {latestDate: row.latestDate, latestVer: row.latestVer, data: row.data, updatedAt: row.updatedAt};
}

function setProductSnapshot(productId, latestDateVal, latestVerVal, dataObj){
  if(!sqlDb) return;
  const stmt = sqlDb.prepare('INSERT OR REPLACE INTO product_snapshot(productId, latestDate, latestVer, data, updatedAt) VALUES(?,?,?,?,?)');
  stmt.bind([productId, latestDateVal||'', latestVerVal||'', JSON.stringify(dataObj), Date.now()]);
  stmt.step(); stmt.free();
  saveDb();
}

function loadProductSnapshot(productId){
  const snapshot = getProductSnapshot(productId);
  if(!snapshot) return null;
  if(Date.now() - snapshot.updatedAt > SNAPSHOT_TTL) return null;
  try { return JSON.parse(snapshot.data); } catch(e){ return null; }
}

function hashString(str){
  const buf = new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256', buf).then(hashBuf=>{
    return Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  });
}

function renderTabBar(){
  const bar = document.getElementById('tabbar');
  const loaded = Object.keys(releases).filter(id=>releases[id]?.length>0).length;

  let html = `<div class="tab tab-all ${activeTab==='all'?'active':''}" onclick="switchTab('all')">
    <div class="tab-name">⊞ All Products</div>
    <div class="tab-meta">${loaded?loaded+' loaded':'drag to reorder'}</div>
  </div>`;

  const ordered = getOrdered();
  html += ordered.map(p=>{
    const st  = statuses[p.id]||'';
    const ver = latestVer[p.id]||'';
    const dt  = latestDate[p.id]||'';
    return `<div class="tab ${st} ${activeTab===p.id?'active':''}" id="tab-${p.id}"
      draggable="true"
      ondragstart="dStart(event,'${p.id}')" ondragover="dOver(event,'${p.id}')"
      ondrop="dDrop(event,'${p.id}')" ondragend="dEnd()"
      onclick="switchTab('${p.id}')">
      <div class="tab-name">
        <div class="tab-dot" style="${ver?'background:'+p.color:''}"></div>
        ${p.name}
      </div>
      <div class="tab-meta">
        ${ver?`<span class="tab-ver">v${esc(ver)}</span>`:''}
        ${dt?`<span class="tab-date">${esc(dt)}</span>`:''}
        ${!ver&&st!=='fetching'?`<span class="tab-date">not fetched</span>`:''}
        ${upToDate[p.id]&&ver?`<span class="tab-utd">✓ up to date</span>`:''}
      </div>
      <button class="tab-fetch-btn" title="Refresh ${p.name}" onclick="fetchOneTab('${p.id}',event)">${st==='fetching'?'…':'↓'}</button>
    </div>`;
  }).join('');

  bar.innerHTML = html;
}

/* Drag */
function dStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>document.getElementById('tab-'+id)?.classList.add('dragging'),0);}
function dOver(e,id){e.preventDefault();document.querySelectorAll('.tab').forEach(t=>t.classList.remove('drag-over'));if(id!==dragId)document.getElementById('tab-'+id)?.classList.add('drag-over');}
function dDrop(e,id){e.preventDefault();if(!dragId||dragId===id)return;const fi=tabOrder.indexOf(dragId),ti=tabOrder.indexOf(id);if(fi<0||ti<0)return;tabOrder.splice(fi,1);tabOrder.splice(ti,0,dragId);saveSS('rg_tab_order',tabOrder);renderTabBar();}
function dEnd(){dragId=null;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('dragging','drag-over'));}

function switchTab(id){
  activeTab=id;

  // Ensure roadmap filter defaults are reset when switching to All Products
  if(id === 'all'){
    const filterProd = document.getElementById('filterProd');
    const filterPhase = document.getElementById('filterPhase');
    const search = document.getElementById('search');
    if(filterProd) filterProd.value = '';
    if(filterPhase) filterPhase.value = '';
    if(search) search.value = '';
  }

  renderTabBar();renderFeed();
  const el=id==='all'?document.querySelector('.tab-all'):document.getElementById('tab-'+id);
  el?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

async function fetchAll(){
  if(busy)return;
  busy=true; errors={};
  const btn=document.getElementById('fetch-all-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin">↻</span> Fetching…';
  document.getElementById('prog-wrap').classList.add('show');

  const prods=getOrdered(); let done=0;
  for(let i=0;i<prods.length;i+=4){
    const batch=prods.slice(i,i+4);
    batch.forEach(p=>setSt(p.id,'fetching'));
    renderTabBar(); renderFeed();
    await Promise.allSettled(batch.map(p=>doFetch(p)));
    done+=batch.length;
    document.getElementById('prog-fill').style.width=(done/prods.length*100)+'%';
    renderTabBar(); renderFeed();
  }

  busy=false; btn.disabled=false; btn.textContent='↓ Fetch All';
  document.getElementById('sync-lbl').textContent='Synced '+new Date().toLocaleTimeString();
  setTimeout(()=>{document.getElementById('prog-wrap').classList.remove('show');document.getElementById('prog-fill').style.width='0%';},700);
}

async function fetchOneTab(id,e){
  if(e) e.stopPropagation();
  const prod=PRODUCTS_DEF.find(p=>p.id===id); if(!prod)return;
  delete releases[id]; delete errors[id];
  setSt(id,'fetching');
  switchTab(id);
  renderTabBar(); renderFeed();
  await doFetch(prod);
  renderTabBar(); renderFeed();
  document.getElementById('sync-lbl').textContent='Synced '+new Date().toLocaleTimeString();
}

// Refresh a single TDM sub-page and re-merge all TDM data
async function fetchTdmSub(url, label, e){
  if(e) e.stopPropagation();
  const prod = PRODUCTS_DEF.find(p=>p.id==='tdm');
  if(!prod) return;

  // Mark the entry being refreshed (highlight the button briefly)
  setSt('tdm', 'fetching');
  renderTabBar(); renderFeed();

  try{
    const md  = await fetchFresh(url);
    const rels = parseContent(md, prod, url);
    // Tag the new items with their sub-label
    rels.forEach(r=>{ r.changes.forEach(c=>{ c.subLabel = label === 'TDM GUI' ? 'GUI' : label; }); });
    // Store keyed by URL so we can replace just this sub-page's data
    if(!window._tdmSubData) window._tdmSubData = {};
    window._tdmSubData[url] = rels;
  } catch(err){
    console.warn('TDM sub fetch error:', err.message);
  }

  // Re-merge all cached sub-pages
  const tdmProd = PRODUCTS_DEF.find(p=>p.id==='tdm');
  const allRels = [];
  for(const entry of tdmProd.urls){
    const cached = window._tdmSubData?.[entry.url];
    if(cached) allRels.push(...cached);
  }

  if(allRels.length > 0){
    // Re-run the TDM date-merge logic (same as doFetch)
    const TYPE_PRIORITY = {breaking:0,feature:1,fix:2,improvement:3};
    const MONTHS_MAP = {january:1,february:2,march:3,april:4,may:5,june:6,july:7,
      august:8,september:9,october:10,november:11,december:12,
      jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const dateToNum = dateStr => {
      if(!dateStr) return 0;
      const normalized = dateStr.trim();
      const m1 = normalized.match(/(\d{1,2})\s+([a-z]+)\s+(\d{4})/i);
      if(m1){const mn=MONTHS_MAP[m1[2].toLowerCase()];if(mn)return parseInt(m1[3])*10000+mn*100+parseInt(m1[1]);}
      const m2 = normalized.match(/([a-z]+)\s+(\d{1,2})[,\s]+(\d{4})/i);
      if(m2){const mn=MONTHS_MAP[m2[1].toLowerCase()];if(mn)return parseInt(m2[3])*10000+mn*100+parseInt(m2[2]);}
      const m3 = normalized.match(/(\d{4})[-\/](\d{2})[-\/](\d{2})/);
      if(m3)return parseInt(m3[1])*10000+parseInt(m3[2])*100+parseInt(m3[3]);
      return 0;
    };
    const numToDisplay={};
    const flat=[];
    allRels.forEach(r=>{
      const num=dateToNum(r.date);
      const key=num||r.date||'Recent';
      if(num&&!numToDisplay[num])numToDisplay[num]=r.date;
      r.changes.forEach(c=>flat.push({...c,_key:key,_docsUrl:r.docsUrl}));
    });
    const byKey={},keyOrder=[];
    flat.forEach(c=>{
      const k=c._key;
      if(!byKey[k]){byKey[k]=[];keyOrder.push(k);}
      if(!byKey[k].some(x=>x.text===c.text))byKey[k].push(c);
    });
    keyOrder.forEach(k=>byKey[k].sort((a,b)=>(TYPE_PRIORITY[a.type]??5)-(TYPE_PRIORITY[b.type]??5)));
    keyOrder.sort((a,b)=>{const na=typeof a==='number'?a:dateToNum(String(a));const nb=typeof b==='number'?b:dateToNum(String(b));return nb-na;});
    const tdmMerged=keyOrder.filter(k=>byKey[k].length>0).map(k=>{
      const display=numToDisplay[k]||String(k);
      return{id:'tdm_'+String(k),productId:'tdm',product:tdmProd,version:display,date:display,changes:byKey[k],docsUrl:tdmProd.urls[0]?.url||tdmProd.urls[0],summary:makeSummary(byKey[k])};
    });
    releases['tdm']=tdmMerged;
    latestVer['tdm']='';
    latestDate['tdm']=tdmMerged[0]?.date||'';
    setProductSnapshot('tdm', latestDate['tdm'], latestVer['tdm'], tdmMerged);
  }

  setSt('tdm','done');
  document.getElementById('sync-lbl').textContent='Synced '+new Date().toLocaleTimeString();
  renderTabBar(); renderFeed();
}

/* Apply pre-parsed entries to in-memory state (shared by page load and refresh paths). */
function applyDbEntries(prod, entries){
  const allRels = [];
  for(const entry of entries){
    const changes = (entry.changes||[]).slice();
    if(prod.id==='tdm' && entry.sourceUrl){
      const label = entry.sourceUrl.includes('subsetter') ? 'Subsetter'
                  : entry.sourceUrl.includes('anonymize') ? 'Anonymize'
                  : entry.sourceUrl.includes('gui')       ? 'GUI'
                  : entry.sourceUrl.includes('workflows') ? 'Workflows' : '';
      if(label) changes.forEach(c=>c.subLabel = label);
    }
    allRels.push({ version: entry.version, date: entry.date, changes, docsUrl: entry.docsUrl, product: prod });
  }

  if(!allRels.length) return;

  const TYPE_PRIORITY = {breaking:0,feature:1,fix:2,improvement:3};

  if(prod.id==='tdm'){
    const MONTHS_MAP = {january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12,jan:1,feb:2,mar:3,apr:4,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const dateToNum = dateStr => {
      if(!dateStr) return 0;
      const s = dateStr.trim();
      const m1 = s.match(/(\d{1,2})\s+([a-z]+)\s+(\d{4})/i);
      if(m1){ const mn=MONTHS_MAP[m1[2].toLowerCase()]; if(mn) return parseInt(m1[3])*10000+mn*100+parseInt(m1[1]); }
      const m2 = s.match(/([a-z]+)\s+(\d{1,2})[,\s]+(\d{4})/i);
      if(m2){ const mn=MONTHS_MAP[m2[1].toLowerCase()]; if(mn) return parseInt(m2[3])*10000+mn*100+parseInt(m2[2]); }
      const m3 = s.match(/(\d{4})[-\/](\d{2})[-\/](\d{2})/);
      if(m3) return parseInt(m3[1])*10000+parseInt(m3[2])*100+parseInt(m3[3]);
      return 0;
    };
    const numToDisplay={}, flat=[];
    allRels.forEach(r=>{
      const num=dateToNum(r.date), key=num||r.date||'Recent';
      if(num&&!numToDisplay[num]) numToDisplay[num]=r.date;
      r.changes.forEach(c=>flat.push({...c,_key:key,_docsUrl:r.docsUrl}));
    });
    const byKey={}, keyOrder=[];
    flat.forEach(c=>{ const k=c._key; if(!byKey[k]){byKey[k]=[];keyOrder.push(k);} if(!byKey[k].some(x=>x.text===c.text)) byKey[k].push(c); });
    keyOrder.forEach(k=>byKey[k].sort((a,b)=>(TYPE_PRIORITY[a.type]??5)-(TYPE_PRIORITY[b.type]??5)));
    keyOrder.sort((a,b)=>{ const na=typeof a==='number'?a:dateToNum(String(a)); const nb=typeof b==='number'?b:dateToNum(String(b)); return nb-na; });
    const tdmMerged = keyOrder.filter(k=>byKey[k].length>0).map(k=>({
      id:'tdm_'+String(k), productId:'tdm', product:prod,
      version: numToDisplay[k]||String(k), date: numToDisplay[k]||String(k),
      changes: byKey[k], docsUrl: prod.urls[0]||'', summary: makeSummary(byKey[k])
    }));
    releases[prod.id]=tdmMerged; latestVer[prod.id]=''; latestDate[prod.id]=tdmMerged[0]?.date||'';
    setProductSnapshot(prod.id, latestDate[prod.id], latestVer[prod.id], tdmMerged);
    setSt(prod.id,'done');
    return;
  }

  const byVer={}, verOrder=[];
  allRels.forEach(r=>{
    if(!byVer[r.version]){ byVer[r.version]={...r,changes:[]}; verOrder.push(r.version); }
    const seen=new Set(byVer[r.version].changes.map(c=>c.text));
    r.changes.forEach(c=>{ if(!seen.has(c.text)){seen.add(c.text);byVer[r.version].changes.push(c);} });
    if(!byVer[r.version].date&&r.date) byVer[r.version].date=r.date;
  });
  verOrder.forEach(v=>byVer[v].changes.sort((a,b)=>(TYPE_PRIORITY[a.type]??5)-(TYPE_PRIORITY[b.type]??5)));
  const meaningful = verOrder.map(v=>byVer[v]).filter(r=>r.changes.length>0);
  if(!meaningful.length) return;
  releases[prod.id]=meaningful; latestVer[prod.id]=meaningful[0].version; latestDate[prod.id]=meaningful[0].date||'';
  setProductSnapshot(prod.id, latestDate[prod.id], latestVer[prod.id], meaningful);
  setSt(prod.id,'done');
}

/* Check live sites for new versions. Called only when user clicks Fetch All / refresh. */
async function doFetch(prod){
  if(!canUseServerApi()){
    return await doFetchRemote(prod);
  }
  try{
    // Ask server to fetch live page, hash-check, and store any new versions
    const chkRes = await fetch(`/api/check/${prod.id}`);
    if(!chkRes.ok) throw new Error(`${chkRes.status} ${chkRes.statusText}`);
    const chk = await chkRes.json();
    if(chk?.error) throw new Error(chk.error);

    upToDate[prod.id] = chk.upToDate;

    if(chk.upToDate){
      // Nothing changed — keep current data, just mark up to date
      setSt(prod.id,'done');
      return;
    }

    // New versions found — reload releases from DB and re-render
    const relRes = await fetch(`/api/releases/${prod.id}`);
    if(!relRes.ok) throw new Error(`${relRes.status} ${relRes.statusText}`);
    const entries = await relRes.json();
    applyDbEntries(prod, entries);
  } catch(serverErr){
    console.warn('doFetch failed:', serverErr);
    return await doFetchRemote(prod);
  }
}

async function doFetchRemote(prod){
  const allRels=[], errs=[];
  const urlEntries = Array.isArray(prod.urls[0]) ? prod.urls.map(u=>({url:u,label:null})) : prod.urls;

  // If there is a fresh cached snapshot, use it and avoid network request.
  const existingSnapshot = loadProductSnapshot(prod.id);
  if(existingSnapshot){
    releases[prod.id] = existingSnapshot;
    latestVer[prod.id] = existingSnapshot[0]?.version || '';
    latestDate[prod.id] = existingSnapshot[0]?.date || '';
    setSt(prod.id,'done');
    return;
  }

  for(const entry of urlEntries){
    const url   = entry.url   || entry;
    const label = entry.label || null;
    const urlCache = getUrlCache(url);
    let md;
    let fetchedHash = null;

    try{
      // Always fetch fresh — add timestamp to bust Jina's cache
      md  = await fetchFresh(url);
      fetchedHash = await hashString(md);

      if(urlCache && urlCache.hash === fetchedHash){
        try{
          const cachedRels = JSON.parse(urlCache.body || '[]');
          if(Array.isArray(cachedRels) && cachedRels.length){
            cachedRels.forEach(r=>{
              if(label) r.changes.forEach(c=>{ c.subLabel = label; });
              allRels.push(r);
            });
            continue;
          }
        } catch(e){ /* parse fail, fall back to fresh parse */ }
      }

      const rel = parseContent(md, prod, url);
      if(rel.length>0){
        rel.forEach(r=>{
          if(label) r.changes.forEach(c=>{ c.subLabel = label; });
        });
        allRels.push(...rel);
        setUrlCache(url,prod.id,JSON.stringify(rel),fetchedHash);
        if(prod.id==='tdm'){
          if(!window._tdmSubData) window._tdmSubData={};
          window._tdmSubData[url]=rel;
        }
      }
    } catch(e){
      if(urlCache && urlCache.body){
        try{
          const cachedRels = JSON.parse(urlCache.body || '[]');
          if(Array.isArray(cachedRels) && cachedRels.length){
            cachedRels.forEach(r=>{
              if(label) r.changes.forEach(c=>{ c.subLabel = label; });
              allRels.push(r);
            });
            continue;
          }
        } catch(err){ }
      }
      errs.push(`${url}: ${e.message}`);
    }
  }

  if(!allRels.length){
    errors[prod.id] = errs.join(' | ') || 'No version entries found.';
    setSt(prod.id,'err'); return;
  }

  const TYPE_PRIORITY = {breaking:0,feature:1,fix:2,improvement:3};

  // ── TDM: merge ALL sub-pages into one unified list ──────────────────────────
  // Sub-pages (Subsetter, Anonymize, GUI, Workflows) have independent version
  // numbers and release on different days, so we group by a NUMERIC date key
  // to ensure "12 March 2026" and "March 12, 2026" land in the same bucket.
  if(prod.id === 'tdm'){

    // Convert any date string → canonical YYYYMMDD integer for reliable grouping
    const MONTHS_MAP = {january:1,february:2,march:3,april:4,may:5,june:6,july:7,
      august:8,september:9,october:10,november:11,december:12,
      jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};

    const dateToNum = dateStr => {
      if(!dateStr) return 0;
      const normalized = dateStr.trim();
      // "14 March 2026"
      const m1 = normalized.match(/(\d{1,2})\s+([a-z]+)\s+(\d{4})/i);
      if(m1){ const mn=MONTHS_MAP[m1[2].toLowerCase()]; if(mn) return parseInt(m1[3])*10000+mn*100+parseInt(m1[1]); }
      // "March 14, 2026" or "March 14 2026"
      const m2 = normalized.match(/([a-z]+)\s+(\d{1,2})[,\s]+(\d{4})/i);
      if(m2){ const mn=MONTHS_MAP[m2[1].toLowerCase()]; if(mn) return parseInt(m2[3])*10000+mn*100+parseInt(m2[2]); }
      // ISO 2026-03-14
      const m3 = normalized.match(/(\d{4})[-\/](\d{2})[-\/](\d{2})/);
      if(m3) return parseInt(m3[1])*10000+parseInt(m3[2])*100+parseInt(m3[3]);
      return 0;
    };

    // Canonical display date from a numeric key + original string
    // (we keep the first human-readable form we see for that numeric key)
    const numToDisplay = {};

    // Flatten all changes from every sub-page release
    const flat = [];
    allRels.forEach(r=>{
      const num = dateToNum(r.date);
      const key = num || r.date || 'Recent';
      // Store first readable form of this date
      if(num && !numToDisplay[num]) numToDisplay[num] = r.date;
      r.changes.forEach(c=>{
        flat.push({ ...c, _key: key, _docsUrl: r.docsUrl });
      });
    });

    // Group by numeric-or-string key
    const byKey = {}, keyOrder = [];
    flat.forEach(c=>{
      const k = c._key;
      if(!byKey[k]){ byKey[k]=[]; keyOrder.push(k); }
      // Dedup by exact text within the same date bucket
      if(!byKey[k].some(x=>x.text===c.text)) byKey[k].push(c);
    });

    // Sort each bucket: Breaking → New → Fix → Improved
    keyOrder.forEach(k=>{
      byKey[k].sort((a,b)=>(TYPE_PRIORITY[a.type]??5)-(TYPE_PRIORITY[b.type]??5));
    });

    // Sort date keys newest first
    keyOrder.sort((a,b)=>{
      const na = typeof a==='number' ? a : dateToNum(String(a));
      const nb = typeof b==='number' ? b : dateToNum(String(b));
      return nb - na;
    });

    // Build one release record per date — using the human-readable date as both
    // the version label and the date field so the UI shows it cleanly
    const tdmMerged = keyOrder
      .filter(k=>byKey[k].length>0)
      .map(k=>{
        const display = numToDisplay[k] || String(k);
        return {
          id: 'tdm_'+String(k),
          productId:'tdm', product:prod,
          version: display,   // shown as the release "version" in the UI
          date: display,
          changes: byKey[k],
          docsUrl: prod.urls[0]?.url||prod.urls[0],
          summary: makeSummary(byKey[k])
        };
      });

    if(!tdmMerged.length){
      errors[prod.id]='No release notes found across TDM sub-pages.';
      setSt(prod.id,'err'); return;
    }

    releases[prod.id]  = tdmMerged;
    latestVer[prod.id] = '';            // TDM has no single version number
    latestDate[prod.id]= tdmMerged[0].date||'';
    setSt(prod.id,'done');
    return;
  }

  // ── ALL OTHER PRODUCTS: standard version-based merge ──────────────────────
  const byVer = {}, verOrder = [];
  allRels.forEach(r=>{
    if(!byVer[r.version]){
      byVer[r.version] = { ...r, changes:[] };
      verOrder.push(r.version);
    }
    const seen = new Set(byVer[r.version].changes.map(c=>c.text));
    r.changes.forEach(c=>{ if(!seen.has(c.text)){ seen.add(c.text); byVer[r.version].changes.push(c); } });
    if(!byVer[r.version].date && r.date) byVer[r.version].date = r.date;
  });

  verOrder.forEach(v=>{
    byVer[v].changes.sort((a,b)=>(TYPE_PRIORITY[a.type]??5)-(TYPE_PRIORITY[b.type]??5));
  });

  const merged = verOrder.map(v=>byVer[v]);

  // Drop versions that have no meaningful changes (e.g. SQL Clone internal-only releases)
  const meaningful = merged.filter(r=>r.changes.length>0);
  if(!meaningful.length){
    errors[prod.id]='All versions contained only internal changes and were filtered out.';
    setSt(prod.id,'err'); return;
  }

  releases[prod.id]  = meaningful;
  latestVer[prod.id] = meaningful[0].version;
  latestDate[prod.id]= meaningful[0].date||'';
  setProductSnapshot(prod.id, latestDate[prod.id], latestVer[prod.id], meaningful);
  setSt(prod.id,'done');
}

function setSt(id,st){ statuses[id]=st; }

/* ═══════════════════════════════════════════
   FRESH FETCH  (Jina + fallbacks, no cache)
═══════════════════════════════════════════ */
async function fetchFresh(url){
  const bust = `?_t=${Date.now()}`;

  // Jina headers — strip Confluence sidebar, target only article body
  const JINA_HEADERS = {
    'Accept':           'text/plain',
    'X-Return-Format':  'markdown',
    'X-No-Cache':       'true',
    'X-With-Links-Summary': 'false',
    'X-Target-Selector': '#main-content, .wiki-content, .confluence-information-macro, #content, article, main, [data-testid="wiki-content"], .page-body',
    'X-Remove-Selector': '#sidebar, .ia-splitter-left, .ia-fixed-sidebar, [data-type="aside"], .navColumn, .pageSection, #navigation, .aui-sidebar, .page-sidebar, .side-bar, nav, footer, #breadcrumb-section, .breadcrumb-container, [aria-label="Page tree"], [aria-label="navigation"], .theme-navigation, .toc-macro, .panel, .columnLayout'
  };

  // Primary: Jina AI reader — renders JS Confluence pages → clean markdown
  try{
    const r = await fetch(`https://r.jina.ai/${url}`,{
      headers: JINA_HEADERS,
      cache:'no-store',
      signal: AbortSignal.timeout(30000)
    });
    if(r.ok){ const t=await r.text(); if(t&&t.length>200) return stripSidebar(t); }
  } catch(e){ console.warn('Jina:',e.message); }

  // Fallback A: allorigins (returns raw HTML — we strip sidebar in htmlToMd)
  try{
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url+bust)}`,{
      cache:'no-store', signal:AbortSignal.timeout(20000)
    });
    if(r.ok){ const j=await r.json(); if(j?.contents&&j.contents.length>200) return htmlToMd(j.contents); }
  } catch(e){ console.warn('allorigins:',e.message); }

  // Fallback B: corsproxy
  try{
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url+bust)}`,{
      cache:'no-store', signal:AbortSignal.timeout(20000)
    });
    if(r.ok){ const t=await r.text(); if(t&&t.length>200) return htmlToMd(t); }
  } catch(e){ console.warn('corsproxy:',e.message); }

  throw new Error('All proxies failed.');
}

// Post-process Jina markdown: remove lines that look like sidebar link lists
// (the sidebar often renders as a dense block of short navigation links at the
// top of the Jina output, before the real article content begins).
function stripSidebar(md){
  const lines = md.split('\n');
  // Find where the "real" article starts: look for the first version-like
  // heading or a heading that is clearly an article title (not a nav link).
  // Sidebar lines tend to be very short and are often just link text.
  let articleStart = 0;
  let consecutiveShort = 0;

  let found = false;
  for(let i=0;i<lines.length;i++){
    const l = lines[i].trim();
    // A line that looks like a proper section heading or version heading
    // signals the start of the actual article content.
    if(/^#{1,3}\s+.{10,}/.test(l) && !/^\[/.test(l)){
      // Skip page-title headings (e.g. "# ProductName X.Y+ Release Notes - Product Documentation")
      // that contain a version range or Confluence page-title suffix — these aren't article content.
      if(/\d+\.\d+[\d.]*\+/.test(l) || /[-–]\s*product\s+documentation/i.test(l) ||
         /^#{1,2}\s+\S.+?\s+v?\d+\.\d+\s+release\s+notes?\s*$/i.test(l)){
        continue;
      }
      articleStart = i; found = true;
      break;
    }
    // If we see a long paragraph line it's also content
    if(l.length > 80 && !l.startsWith('[') && !l.startsWith('-')){
      articleStart = i; found = true;
      break;
    }
  }

  // If we couldn't find a clear start, return as-is
  if(!found) return md;
  return lines.slice(articleStart).join('\n');
}

function htmlToMd(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  // Remove sidebar and navigation elements before extracting text
  const SIDEBAR_SELS = [
    '#sidebar','.ia-splitter-left','.ia-fixed-sidebar','[data-type="aside"]',
    '.navColumn','.pageSection','#navigation','.aui-sidebar','.page-sidebar',
    '.side-bar','nav','footer','#breadcrumb-section','.breadcrumb-container',
    '[aria-label="Page tree"]','[aria-label="navigation"]','.theme-navigation',
    '.toc-macro', // Confluence table-of-contents macro (duplicates headings)
  ];
  ['script','style','noscript','head',...SIDEBAR_SELS].forEach(sel=>{
    doc.querySelectorAll(sel).forEach(e=>e.remove());
  });
  doc.querySelectorAll('li').forEach(li=>{if(!li.textContent.trim().startsWith('- '))li.prepend('- ');});
  doc.querySelectorAll('h1,h2,h3,h4,h5').forEach(h=>h.prepend('\n'+'#'.repeat(parseInt(h.tagName[1]))+' '));
  doc.querySelectorAll('tr').forEach(tr=>{
    const cells=[...tr.querySelectorAll('td,th')].map(c=>c.textContent.trim()).filter(Boolean);
    if(cells.length) tr.prepend('\n'+cells.join(' | ')+'\n');
  });
  return (doc.body?.innerText||doc.body?.textContent||'').replace(/\n{3,}/g,'\n\n');
}

/* ═══════════════════════════════════════════
   DATE HELPERS
═══════════════════════════════════════════ */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// Broad pattern — we want to capture day+month+year whenever possible
const DATE_RE = /((?:\d{1,2}(?:st|nd|rd|th)?\s+)?(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)[\s,\.]+(?:\d{1,2}(?:st|nd|rd|th)?[,\s]+)?\d{4}|\d{4}[-\/]\d{2}[-\/]\d{2}|\d{1,2}[-\/]\d{1,2}[-\/]\d{4})/i;

function normaliseDate(raw){
  if(!raw) return '';
  raw = raw.trim().replace(/\s+/g,' ');
  const iso = raw.match(/^(\d{4})[-\/](\d{2})[-\/](\d{2})$/);
  if(iso){ const mn=MONTHS[parseInt(iso[2],10)-1]; return mn?`${parseInt(iso[3],10)} ${mn} ${iso[1]}`:raw; }
  const dmy = raw.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if(dmy){ const mn=MONTHS[parseInt(dmy[2],10)-1]; return mn?`${parseInt(dmy[1],10)} ${mn} ${dmy[3]}`:raw; }
  // "March 2026" → keep as-is, but try to detect if we have a day elsewhere
  return raw;
}

function hasDay(d){ return /\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)/i.test(d) || /(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s+\d{1,2}[,\s]/i.test(d); }

/* ═══════════════════════════════════════════
   VERSION HEADER DETECTION
═══════════════════════════════════════════ */
const VER_RE = /\b(\d+\.\d+(?:\.\d+){0,3}(?:[-.]?(?:beta|rc|alpha|preview)\s*\d*)?)\b/i;

function isVersionHeader(line){
  if(!line||line.length>180) return false;
  if(!VER_RE.test(line)) return false;
  // Only reject bare URL lines (not headings that contain download links)
  if(/^https?:\/\/\S+$/.test(line)) return false;          // entire line is a bare URL
  if(/\.jar|\.zip|\.war|\.tar/.test(line)&&!/^#/.test(line)) return false; // archive file ref outside heading
  if(line.split(/\s+/).length > 20) return false;
  if(/^#{1,5}\s/.test(line)){
    // Reject page-title headings: version range like "14.1+" or Confluence title suffix
    if(/\d+\.\d+[\d.]*\+/.test(line)) return false;
    if(/[-–]\s*product\s+documentation/i.test(line)) return false;
    // Reject "# ProductName X.Y release notes" (2-part version + "release notes" = page title, not a release)
    if(/^#{1,2}\s+\S.+?\s+v?\d+\.\d+\s+release\s+notes?\s*$/i.test(line)) return false;
    return true;
  }
  if(/^\*{1,2}[^*]+\*{1,2}$/.test(line.trim()))          return true;
  if(/^version\s+\d/i.test(line.trim()))                  return true;
  if(/^v?\d+\.\d+[\d.]*\s*([-–(]|$)/i.test(line.trim())) return true;
  if(/release[sd]?\s+(notes\s+)?(?:for\s+)?v?\d/i.test(line)) return true;
  if(/^[a-z][a-z ]+\s+v?\d+\.\d+/i.test(line.trim())&&line.trim().length<90) return true;
  return false;
}

/* ═══════════════════════════════════════════
   CONTENT PARSER
═══════════════════════════════════════════ */
// ── NOISE / IGNORE FILTERS ──────────────────────────────────────────────────
// Items matching any of these patterns are silently dropped from ALL products.
const GLOBAL_IGNORE = [
  /^internal\s+(fix(es)?\s+and\s+improvement|updates?|changes?)\.?$/i,
  /^internal\s+(fix|improvement)\.?$/i,
  /^internal fixes and improvements\.?$/i,
  /^this release of sql clone includes/i,
  /^this release includes/i,
  /frequent\s+updates?\s+release/i,
  /\belectron\b/i,
  /RgCompare\.Cli/i,
  /\bv?\d+\.\d+[\d.]*-rc\d+/i,
];

// TDM sub-page nav labels — bullets on the main TDM page that are just links
// TO sub-pages rather than actual change descriptions.
const TDM_NAV_LABELS = ['TDM GUI','GUI','Subsetter','Anonymize','Workflows','Component'];
function isTdmNavLink(text){
  // Matches items like "TDM GUI", "Subsetter", "[GUI](url)", "Component" that
  // are navigation pointers to sub-pages, not actual release note entries.
  const t = text.trim();
  if(TDM_NAV_LABELS.some(l => t.toLowerCase()===l.toLowerCase())) return true;
  // Raw markdown link not cleaned: [Label](url)
  if(/^\[?(TDM GUI|GUI|Subsetter|Anonymize|Workflows|Component)\]?(?:\(https?:\/\/[^)]+\))?$/i.test(t)) return true;
  return false;
}

const SQLPROMPT_IGNORE = [
  /^internal\s+library\s+updates?\.?$/i,
];

function isIgnored(text, prodId){
  if(GLOBAL_IGNORE.some(re => re.test(text))) return true;
  if(prodId === 'sqlprompt' && SQLPROMPT_IGNORE.some(re => re.test(text))) return true;
  return false;
}

function parseContent(text, prod, sourceUrl){
  const lines  = text.split('\n');
  const result = [];
  const seen   = new Set();
  let cur      = null;
  let curSec   = '';

  const NOISE = /^(skip to|on this page|table of contents|contents|navigation|edit this page|copy link|print\s*$|share\s*$|send feedback|last modified|created by|owned by|labels:|space:|home\s*$|search\s*$|log in|sign in|sign up|×\s*$|close\s*$|menu\s*$|breadcrumb|was this helpful|yes\s*$|no\s*$|page last updated|published\s+\d)/i;
  const isNoise = l => l.length<3 || NOISE.test(l) || /^https?:\/\/\S+$/.test(l) || /^\|[-:\s|]+\|$/.test(l);

  const cleanMd = l => l
    .replace(/^#{1,6}\s+/,'').replace(/^[-*•·▪▸›▶]\s+/,'').replace(/^\d+[.):;\s]\s+/,'')
    .replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1')
    .replace(/__([^_]+)__/g,'$1').replace(/_([^_]+)_/g,'$1')
    .replace(/`([^`]+)`/g,'$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/\[([^\]]+)\]\[[^\]]*\]/g,'$1')
    .trim();

  // Also drop entire version blocks whose version string is an RC tag
  const isRcVersion = v => /^v?\d+\.\d+[\d.]*-rc\d+$/i.test(v);

  for(let i=0;i<lines.length;i++){
    const raw=lines[i], line=raw.trim();
    if(!line||isNoise(line)) continue;

    // ── VERSION HEADER ──
    if(isVersionHeader(line)){
      if(cur&&cur.changes.length>0&&result.length<15) result.push(cur);
      if(result.length>=15) break;

      const vm=line.match(VER_RE), dm=line.match(DATE_RE), ver=vm?.[1]?.trim();
      if(!ver||seen.has(ver)||isRcVersion(ver)){cur=null;continue;}
      seen.add(ver);

      let date = dm ? normaliseDate(dm[0]) : '';
      if(!date||!hasDay(date)){
        for(let j=i+1;j<Math.min(i+11,lines.length);j++){
          const a=lines[j].trim();
          if(!a||isNoise(a)) continue;
          const dm2=a.match(DATE_RE);
          if(dm2&&a.length<120){
            const norm=normaliseDate(dm2[0]);
            if(hasDay(norm)){date=norm;break;}
            else if(!date) date=norm;
          }
        }
      }

      cur={id:`${prod.id}_${ver}`,productId:prod.id,product:prod,version:ver,date,changes:[],docsUrl:sourceUrl,summary:''};
      curSec='';
      continue;
    }

    if(!cur) continue;

    // Pick up date
    if(!cur.date&&line.length<120){
      const dm=line.match(DATE_RE);
      if(dm&&!/^v?\d+\./.test(line)){const n=normaliseDate(dm[0]);if(n)cur.date=n;}
    }

    // ── SUB-SECTION HEADINGS ──
    if(/^#{2,6}\s/.test(raw)&&!VER_RE.test(line)){
      const clean=cleanMd(line);
      if(/^#{2}\s/.test(raw)&&cur.changes.length>0){
        const lo=clean.toLowerCase();
        const related=['bug','fix','new','feature','change','improv','add','remov','deprecat',
          'breaking','security','known','issue','enhancement','note','detail','update','migrat',
          'support','enabl','introduc','depend','version','resolv','correct','perf','optim',
          'compat','upgrade','component','module','driver','enhanc','what','release'].some(w=>lo.includes(w));
        if(!related){if(result.length<15)result.push(cur);cur=null;continue;}
      }
      // Drop entire sections that match ignore patterns (e.g. "Internal fixes and improvements")
      if(isIgnored(clean)){ curSec='__ignore__'; continue; }
      curSec=clean;
      continue;
    }

    // Skip everything inside an ignored section
    if(curSec==='__ignore__') continue;

    // ── BULLET LIST ITEMS ──
    if(/^[-*•·▪▸›▶]\s+/.test(line)||/^\d+[.)]\s+/.test(line)){
      const text=cleanMd(line);
      if(text.length>4&&text.length<700&&!isIgnored(text,prod?.id)&&!isTdmNavLink(text)){
        cur.changes.push({type:classifyCtx(text,curSec),text});
      }
      continue;
    }

    // ── TABLE ROWS ──
    if(line.includes('|')&&line.split('|').length>=3){
      const cells=line.split('|').map(c=>c.trim()).filter(c=>c&&!/^[-:]+$/.test(c)&&c.length>2);
      if(cells.length>=1){
        const desc=cells.filter(c=>!/^\d+$/.test(c)&&!/^[A-Z]{2,}-\d+$/.test(c)).reduce((a,b)=>b.length>a.length?b:a,'');
        if(desc.length>6&&desc.length<600&&!isIgnored(desc))
          cur.changes.push({type:classifyCtx(desc,curSec),text:desc});
      }
      continue;
    }

    // ── PLAIN LINES (fallback) ──
    if(line.length>14&&line.length<500&&!line.startsWith('#')){
      const clean=cleanMd(line);
      if(clean.length>10&&!isIgnored(clean)&&!isTdmNavLink(clean)&&/\b(add(ed|s|ing)?|fix(ed|es|ing)?|remov(ed|es|ing)?|improv(ed|es|ing)?|updat(ed|es|ing)?|support(s|ed|ing)?|enabl(ed|es|ing)?|resolv(ed|es|ing)?|deprecat(ed|es|ing)?|introduc(ed|es|ing)?|allow(s|ed|ing)?|replac(ed|es|ing)?|creat(ed|es|ing)?|chang(ed|es|ing)?|migrat(ed|es|ing)?|implement(ed|s|ing)?|now\s+support|no longer)/i.test(clean)){
        cur.changes.push({type:classifyCtx(clean,curSec),text:clean});
      }
    }
  }

  if(cur&&cur.changes.length>0&&result.length<15) result.push(cur);
  result.forEach(r=>{r.summary=makeSummary(r.changes);r.date=r.date||'';});
  return result;
}

function classifyCtx(text,section){
  const t = text.toLowerCase();
  const sectionLower = (section||'').toLowerCase();
  if(/\bsecurit|vulnerabilit|\bcve\b|exploit/.test(t)) return 'security';
  if(/fix(es)?|bug(s)?|\bissue(s)?\b|resolv|correct|patch/.test(sectionLower)) return 'fix';
  if(/break|incompatib|no longer\s+support/.test(sectionLower)) return 'breaking';
  if(/new\s*feature|feature(s)?|add(ed|ition)?|introduc|enabl|what.?s new/.test(sectionLower)) return 'feature';
  if(/improv|enhanc|optim|perf|update|upgrad|change(s)?/.test(sectionLower)) return 'improvement';
  if(/\bbreak(ing)?\b|incompatib|no longer support|drop(ped)?\s+support/.test(t)) return 'breaking';
  if(/\bfix(ed|es)?\b|\bbug\b|\bissue\b|\berror\b|\bcrash\b|exception|incorrect|wrong|\bfail(ed|s)?\b|resolv(ed)?|correct(ed)?/.test(t)) return 'fix';
  if(/\bnew\b|add(ed|s)?\b|introduc(ed)?|\bfeature\b|support(s|ed)?\s+for|enabl(ed)?|creat(ed)?|allow(s|ed)?|now support/.test(t)) return 'feature';
  return 'improvement';
}

function makeSummary(changes){
  const f=changes.filter(c=>c.type==='feature').length, x=changes.filter(c=>c.type==='fix').length;
  const b=changes.filter(c=>c.type==='breaking').length;
  const parts=[];
  if(b)parts.push(`${b} breaking change${b>1?'s':''}`);
  if(f)parts.push(`${f} new feature${f>1?'s':''}`);
  if(x)parts.push(`${x} bug fix${x>1?'es':''}`);
  const rest=changes.length-f-x-b;
  if(rest)parts.push(`${rest} improvement${rest>1?'s':''}`);
  return parts.join(', ')||`${changes.length} change${changes.length!==1?'s':''}`;
}

/* ═══════════════════════════════════════════
   CURRENT QUARTER AT A GLANCE
═══════════════════════════════════════════ */

function currentQuarterInfo(){
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  if(m<3)  return {label:'Q1',badge:'Q1 '+y,period:'Jan 1 – Mar 31, '+y,next:'Q2 '+y};
  if(m<6)  return {label:'Q2',badge:'Q2 '+y,period:'Apr 1 – Jun 30, '+y,next:'Q3 '+y};
  if(m<9)  return {label:'Q3',badge:'Q3 '+y,period:'Jul 1 – Sep 30, '+y,next:'Q4 '+y};
  return      {label:'Q4',badge:'Q4 '+y,period:'Oct 1 – Dec 31, '+y,next:'Q1 '+(y+1)};
}

function buildQ1HTML(allData, productName){
  const changes = Array.isArray(allData) && allData.length && allData[0] && allData[0].change ? allData.map(d=>d.change) : allData;
  if(!changes.length) return '';
  const qi = currentQuarterInfo();

  // Redgate database priority weights: SQL Server 50%, Oracle 30%, Postgres 20%, MySQL 10%
  // Peripheral DBs (MariaDB, Cassandra, ClickHouse, Mongo) get low weight.
  const DB_WEIGHT = {
    'sql server':1.0,'mssql':1.0,'azure sql':1.0,'ssms':1.0,'fabric sql':1.0,
    'postgresql':0.9,'postgres':0.9,
    'oracle':0.85,
    'mysql':0.7,
    'mariadb':0.2,'clickhouse':0.15,'cassandra':0.15,'mongodb':0.2,'databricks':0.2,
  };

  const isPeripheral = c => {
    const t = c.text.toLowerCase();
    return /\bmariadb\b|\bclickhouse\b|\bcassandra\b|\bdatabricks\b|\bmongodb\b|\bdocumentdb\b/.test(t)
      && !/\bsql server\b|\bpostgres|\boracle\b|\bmysql\b/.test(t);
  };

  const dbScore = c => {
    const t = c.text.toLowerCase();
    let w = 0;
    for(const [db, weight] of Object.entries(DB_WEIGHT)){
      if(t.includes(db)) w = Math.max(w, weight);
    }
    if(w === 0) w = 0.6; // cross-platform or unspecified
    const typeBoost = {feature:1.4, breaking:1.3, fix:1.0, improvement:0.9}[c.type] || 1.0;
    const wordBoost = Math.min(1.3, 1 + (c.text.split(/\s+/).length - 5) * 0.04);
    return w * typeBoost * wordBoost;
  };

  const features = changes.filter(c=>c.type==='feature');
  const fixes    = changes.filter(c=>c.type==='fix');
  const breaking = changes.filter(c=>c.type==='breaking');
  const imps     = changes.filter(c=>c.type==='improvement');

  // Rank features by DB relevance, deprioritising peripheral database changes
  const coreFeatures = features.filter(c=>!isPeripheral(c)).sort((a,b)=>dbScore(b)-dbScore(a));
  const topFeat   = coreFeatures[0] || features.sort((a,b)=>dbScore(b)-dbScore(a))[0];
  const secondFeat = coreFeatures[1];
  const coreChanges = changes.filter(c=>!isPeripheral(c));

  // Theme detection anchored to Redgate's core DB markets
  const valueThemes = [
    { label:'SQL Server and Azure SQL modernisation', re:/(sql server 202|ssms 2[12]|azure sql|fabric sql|sql server upgrade|always on|linked server)/i },
    { label:'PostgreSQL capability expansion',        re:/(postgresql|postgres|pg_stat|pglogical|aurora postgres)/i },
    { label:'Oracle database support',               re:/(\boracle\b|plsql|pl\/sql|oracle rac)/i },
    { label:'MySQL reliability and support',         re:/(\bmysql\b|innodb|aurora mysql)/i },
    { label:'AI-assisted database development',      re:/(ai|prompt ai|ai completion|intelligen|copilot|machine learn|smart suggest)/i },
    { label:'database schema migration and DevOps',  re:/(migrat|schema change|flyway|deploy|version|baseline|drift|pipeline|ci.cd)/i },
    { label:'developer productivity',               re:/(speed|faster|perform|latency|optim|productiv|workflow|auto)/i },
    { label:'data masking and test data management', re:/(mask|anonymi|subset|pii|gdpr|data protect|sensitive|test data)/i },
    { label:'monitoring and performance alerting',   re:/(monitor|alert|baseline|health|observ|dashboard|metric|deadlock|wait stat|blocking)/i },
  ];

  const themeHits = valueThemes
    .map(t => ({ label:t.label, count:coreChanges.filter(c=>t.re.test(c.text)).length }))
    .filter(t => t.count > 0)
    .sort((a,b) => b.count - a.count);

  const topThemes = themeHits.slice(0,2).map(t=>t.label);
  const label = productName || 'the Redgate portfolio';

  // Detect primary databases/platforms affected by analyzing top features and themes
  const detectPrimaryDBs = (feat, themes) => {
    const dbs = [];
    const text = feat ? feat.text.toLowerCase() : '';
    const allText = text + ' ' + themes.join(' ').toLowerCase();
    
    if (/\bsql server\b|\bmssql\b|\bazure sql\b|\bfabric sql\b/.test(allText)) dbs.push('SQL Server');
    if (/\boracle\b/.test(allText)) dbs.push('Oracle');
    if (/\bpostgres\b|\bpostgresql\b/.test(allText)) dbs.push('PostgreSQL');
    if (/\bmysql\b/.test(allText)) dbs.push('MySQL');
    
    // If no specific DBs detected, default based on Redgate's core markets
    if (dbs.length === 0) {
      if (themes.some(t => /sql server|azure sql/.test(t))) dbs.push('SQL Server');
      if (themes.some(t => /oracle/.test(t))) dbs.push('Oracle');
      if (themes.some(t => /postgres/.test(t))) dbs.push('PostgreSQL');
      if (dbs.length === 0) dbs.push('SQL Server', 'Oracle'); // Default to core markets
    }
    
    return dbs.slice(0, 2); // Limit to top 2
  };

  const primaryDBs = detectPrimaryDBs(topFeat, topThemes);
  const dbText = primaryDBs.length === 1 ? primaryDBs[0] : primaryDBs.join(' and ');

  // Build product hotspot context for 'All Products' view
  let portfolioContext = '';
  if(!productName){
    const prodCounts = allData.reduce((acc, d) => {
      const n = d.prod?.name || 'Unknown';
      acc[n] = (acc[n] || 0) + 1;
      return acc;
    }, {});
    const topProducts = Object.entries(prodCounts).sort((a,b)=>b[1]-a[1]).slice(0,3);
    if(topProducts.length){
      portfolioContext = `Top activity is coming from ${topProducts.map(([p,c])=>`${p} (${c})`).join(', ')}. `;
    }
  }

  // ── CURRENT QUARTER SUMMARY ──────────────────────────────────────────────
  // One paragraph: direction + why it matters to Redgate's SQL Server, Oracle,
  // Postgres, and MySQL customer base. No release counts. Explain the "so what."
  let summary = '';

  if(topThemes.length >= 2 && topFeat){
    summary = `${portfolioContext}${label} moved the needle on ${topThemes[0]} and ${topThemes[1]}. The headline update — "${topFeat.text}" — is a strong operational win for ${productName ? 'customers' : "Redgate's " + dbText + " customers"}, helping them reduce risk and accelerate adoption in the next quarter.`;
  } else if(topThemes.length >= 1 && topFeat){
    summary = `${portfolioContext}This quarter is defined by a clear pivot toward ${topThemes[0]}. "${topFeat.text}" breaks an existing process bottleneck for ${dbText} teams, which should translate directly to easier deployments and lower support overhead.`;
  } else if(topFeat){
    summary = `${portfolioContext}${label} delivered a key capability with "${topFeat.text}." For ${dbText} environments${productName ? '' : " — where the majority of Redgate's customers operate"}, this strengthens the core value proposition and gives sales a concrete demonstration of continued momentum.`;
  } else {
    summary = `${portfolioContext}${label} focused on reliability and polish during this release cycle, shipping resolutions that reduce friction for ${dbText} teams under operational load. That stability work underpins customer confidence and supports larger enterprise deployments.`;
  }

  if(breaking.length){
    summary += ` One important note: there ${breaking.length === 1 ? 'is a change that requires' : 'are changes that require'} customer action before upgrading. Surface this proactively — it's far better to have that conversation on your terms than to have a customer discover it mid-upgrade.`;
  }

  // ── NEXT QUARTER OUTLOOK: where is the solution growing ─────────────────────
  const bullets = [];
  const coreOrder = ['sql server', 'oracle', 'postgres', 'mysql'];
  const coreThemes = coreOrder
    .map(core => topThemes.find(t => new RegExp(`\\b${core}\\b`, 'i').test(t)))
    .filter(Boolean);

  // Bullet 1: primary core data platform priority
  if(coreThemes.length){
    bullets.push(`${label} is prioritizing ${coreThemes[0]} this quarter — this aligns most closely with your major ${dbText} accounts and signals that the product is doubling down on core database reliability and compatibility.`);
  } else if(topThemes.length){
    bullets.push(`${label} is focusing on ${topThemes[0]} this quarter; align messaging to the outcome for ${dbText} teams (reduced risk, easier migrations, faster deployments).`);
  } else {
    bullets.push(`${label} continues to refine its core database strengths, and this consistency is a strong basis for long-term confidence in enterprise deployments.`);
  }

  // Bullet 2: secondary theme from core or top themes
  if(coreThemes.length >= 2){
    bullets.push(`${label} is also investing in ${coreThemes[1]}, which reinforces support for a broader database portfolio and lets sales conversations be explicit about multi-platform compatibility.`);
  } else if(topThemes.length >= 2){
    bullets.push(`${label} has a secondary emphasis on ${topThemes[1]}, which can be framed as an incremental step toward deeper platform maturity and lower operational friction.`);
  } else if(coreThemes.length === 1 && topThemes.length >= 2){
    bullets.push(`${label} has additional progress outside the top core priority, showing the product is balancing core platform stability with strategic innovation.`);
  }

  // Bullet 3: strategic takeaway + action
  if(topFeat){
    bullets.push(`${topFeat.text} is the strongest customer-facing narrative from this release cycle. Frame it as a business outcome for ${dbText} teams (e.g., lower downtime, fewer manual steps, more predictable deployments).`);
  } else {
    bullets.push(`Use the next release cycle to ask customers where they need the most risk reduction in database operations; connect that directly to the release patterns and priorities shown here.`);
  }

  const bulletHTML = bullets.slice(0,3).map(b =>
    `<div class="cq-bullet"><div class="cq-dot"></div><span>${esc(b)}</span></div>`
  ).join('');

  return `<div class="cq-wrap">
    <div class="cq-hdr">
      <div class="cq-badge">${qi.badge}</div>
      <div class="cq-title">${productName?productName+' — ':''}Current Quarter At A Glance</div>
      <div class="cq-period">${qi.period}</div>
    </div>
    <div class="cq-summary">${esc(summary)}</div>
    <div class="cq-next">
      <div class="cq-next-lbl">Next Quarter Outlook — ${qi.next}</div>
      <div class="cq-bullets">${bulletHTML}</div>
    </div>
  </div>`;
}
